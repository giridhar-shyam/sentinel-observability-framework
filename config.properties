# Sentinel Strands — configuration
# Values here are overridden by environment variables of the same name.

# Run mode: local | agentcore
RUN_TYPE=local

# IAM role the agent assumes for AWS API calls
DISCOVERY_ROLE_ARN=arn:aws:iam::YOUR_ACCOUNT_ID:role/CloudDiscoveryAgentRole

# Shared workarea bucket (all agents read/write here, keyed by session ID)
WORKAREA_BUCKET=sentinel-agent-workarea-YOUR_ACCOUNT_ID

# AWS region
AWS_REGION=us-east-1

# Bedrock models
MODEL_ID=us.amazon.nova-pro-v1:0
MONITORING_MODEL_ID=us.anthropic.claude-3-5-sonnet-20241022-v2:0

# Bedrock Knowledge Base
KNOWLEDGE_BASE_ID=<YOUR_KB_ID>
KNOWLEDGE_BASE_DATA_SOURCE_ID=<YOUR_DS_ID>
KNOWLEDGE_BASE_BUCKET=cloud-discovery-agent-kb-YOUR_ACCOUNT_ID

# SNS
ALARMS_NOTIFICATION_TOPIC_ARN=arn:aws:sns:us-east-1:YOUR_ACCOUNT_ID:alarms_notification

# Logging
LOG_LEVEL=INFO

# AgentCore runtime ARNs (required when RUN_TYPE=agentcore)
ORCHESTRATOR_AGENT_ARN=
DISCOVERY_AGENT_ARN=
MONITORING_AGENT_ARN=
REMEDIATION_AGENT_ARN=
